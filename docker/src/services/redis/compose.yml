services:
  redis:
    image: redis:7.4.1
    restart: unless-stopped
    container_name: ${PKG_NAME}-redis
    env_file:
      - path: $RUN/.env.redis
        required: true
    networks:
        - default
    volumes:
      - data:/data

networks:
  default:
    external: true
    name: ${PKG_NAME}

volumes:
  data:
    name: ${PKG_NAME}-redis-data