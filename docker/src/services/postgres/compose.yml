services:
  postgres:
    image: postgres:17.2
    restart: unless-stopped
    container_name: ${PKG_NAME}-postgres
    env_file:
      - path: $RUN/.env.postgres
        required: true
    shm_size: 512mb
    networks:
      - default
    ports:
      - "5432:5432"
    command: >
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
    volumes:
      - data:/var/lib/postgresql/data
      - $RUN/postgres/server.crt:/var/lib/postgresql/server.crt
      - $RUN/postgres/server.key:/var/lib/postgresql/server.key
      - $VOL/services/postgres/support/initdb.d:/docker-entrypoint-initdb.d

networks:
  default:
    external: true
    name: ${PKG_NAME}

volumes:
  data:
    name: ${PKG_NAME}-postgres-data