services:
  caddy:
    image: caddy:2.9-alpine
    restart: unless-stopped
    container_name: ${PKG_NAME}-caddy
    cap_add:
      - NET_ADMIN
    networks:
      - default
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - $SRC/config:/etc/caddy/Caddyfile
      - data:/data
      - config:/config

networks:
  default:
    external: true
    name: ${PKG_NAME}

volumes:
  data:
    name: ${PKG_NAME}-caddy-data
  config:
    name: ${PKG_NAME}-caddy-config